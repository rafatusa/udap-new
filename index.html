<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>udap-new</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 680px;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(56, 139, 253, 0.15);
      border: 1px solid rgba(56, 139, 253, 0.4);
      color: #58a6ff;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.3rem 0.85rem;
      border-radius: 999px;
    }

    .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      background: #58a6ff;
      border-radius: 50%;
      display: inline-block;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .hero-title {
      font-size: clamp(2.4rem, 6vw, 3.6rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      text-align: center;
      background: linear-gradient(135deg, #e6edf3 0%, #8b949e 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.15;
    }

    .hero-subtitle {
      color: #8b949e;
      font-size: 1.05rem;
      text-align: center;
      line-height: 1.7;
      max-width: 480px;
    }

    .card {
      width: 100%;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 2rem 2.2rem;
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
    }

    .card:hover {
      border-color: #58a6ff55;
      box-shadow: 0 0 0 1px #58a6ff22, 0 8px 40px rgba(0, 0, 0, 0.4);
    }

    .card-row {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .card-row + .card-row {
      padding-top: 1.4rem;
      border-top: 1px solid #21262d;
    }

    .icon-wrap {
      flex-shrink: 0;
      width: 42px;
      height: 42px;
      border-radius: 10px;
      background: #21262d;
      border: 1px solid #30363d;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-wrap svg {
      width: 20px;
      height: 20px;
    }

    .info-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #6e7681;
      margin-bottom: 0.2rem;
    }

    .info-value {
      font-size: 1.05rem;
      font-weight: 600;
      color: #e6edf3;
      letter-spacing: -0.01em;
    }

    .info-value.mono {
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 0.97rem;
      color: #79c0ff;
    }

    .repo-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.35rem;
      color: #58a6ff;
      font-size: 0.82rem;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .repo-link:hover {
      color: #a5d6ff;
      text-decoration: underline;
    }

    .repo-link svg {
      width: 13px;
      height: 13px;
    }

    .actions {
      display: flex;
      gap: 0.9rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1.4rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      border: none;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: #238636;
      color: #ffffff;
      border: 1px solid #2ea043;
    }

    .btn-primary:hover {
      background: #2ea043;
      box-shadow: 0 0 12px rgba(46, 160, 67, 0.35);
    }

    .btn-secondary {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
    }

    .btn-secondary:hover {
      background: #30363d;
      border-color: #8b949e;
    }

    footer {
      margin-top: 1rem;
      padding: 1.2rem;
      text-align: center;
      color: #484f58;
      font-size: 0.82rem;
      letter-spacing: 0.02em;
      border-top: 1px solid #21262d;
      width: 100%;
      max-width: 680px;
    }

    footer span {
      color: #6e7681;
      font-weight: 500;
    }

    footer .highlight {
      color: #58a6ff;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="badge">Active Project</div>

    <h1 class="hero-title">udap-new</h1>

    <p class="hero-subtitle">
      A modern, streamlined project built for performance and clarity.
      Explore the repository and get started in minutes.
    </p>

    <div class="card">

      <!-- Project Name -->
      <div class="card-row">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
        </div>
        <div>
          <div class="info-label">Project Name</div>
          <div class="info-value">udap-new</div>
        </div>
      </div>

      <!-- Repo -->
      <div class="card-row">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="#3fb950" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
          </svg>
        </div>
        <div>
          <div class="info-label">Repository</div>
          <div class="info-value mono">udap-new</div>
          <a href="#" class="repo-link">
            github.com / udap-new
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
              <polyline points="15 3 21 3 21 9"/>
              <line x1="10" y1="14" x2="21" y2="3"/>
            </svg>
          </a>
        </div>
      </div>

    </div>

    <div class="actions">
      <a href="#" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
        </svg>
        View Repository
      </a>
      <a href="#" class="btn btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        Documentation
      </a>
    </div>

  </div>

  <footer>
    <span>Developed by</span> <span class="highlight">Royal Bengal AI</span>
    &nbsp;&mdash;&nbsp; &copy; 2025 All rights reserved.
  </footer>

</body>
</html>
