name: Deploy nginx to EC2

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  provision:
    name: Provision EC2
    runs-on: ubuntu-latest
    outputs:
      server_ip: ${{ steps.get_ip.outputs.ip }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Check existing AWS resources
        id: check_ec2
        run: |
          PROJECT="${{ secrets.PROJECT_NAME }}"
          EXISTING_IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Project,Values=$PROJECT" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text 2>/dev/null || echo "None")

          KEY_EXISTS=$(aws ec2 describe-key-pairs \
            --filters "Name=key-name,Values=$PROJECT-key" \
            --query "KeyPairs[0].KeyName" --output text 2>/dev/null || echo "None")

          SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=$PROJECT-sg" \
            --query "SecurityGroups[0].GroupId" --output text 2>/dev/null || echo "None")

          if [ "$EXISTING_IP" != "None" ] && [ "$EXISTING_IP" != "null" ] && [ -n "$EXISTING_IP" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "ip=$EXISTING_IP" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

          echo "key_exists=$KEY_EXISTS" >> $GITHUB_OUTPUT
          echo "sg_id=$SG_ID" >> $GITHUB_OUTPUT

      - uses: hashicorp/setup-terraform@v3

      # 🔎 DEBUG STEP
      - name: Debug AWS identity and S3 state
        run: |
          echo "Checking AWS identity..."
          aws sts get-caller-identity

          echo "Checking S3 bucket..."
          aws s3 ls s3://${{ secrets.TF_STATE_BUCKET }}

          echo "Checking Terraform state path..."
          aws s3api head-object \
            --bucket ${{ secrets.TF_STATE_BUCKET }} \
            --key ${{ secrets.PROJECT_NAME }}/terraform.tfstate || true

      - name: Create S3 state bucket
        if: steps.check_ec2.outputs.exists != 'true'
        run: |
          aws s3api head-bucket --bucket ${{ secrets.TF_STATE_BUCKET }} \
          || aws s3 mb s3://${{ secrets.TF_STATE_BUCKET }} --region ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        if: steps.check_ec2.outputs.exists != 'true'
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"
        working-directory: terraform

      - name: Import existing resources
        if: steps.check_ec2.outputs.exists != 'true'
        run: |
          KEY="${{ steps.check_ec2.outputs.key_exists }}"
          SG="${{ steps.check_ec2.outputs.sg_id }}"

          [ "$KEY" != "None" ] && terraform import \
            -var="public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            aws_key_pair.deployer "${{ secrets.PROJECT_NAME }}-key" 2>/dev/null || true

          [ "$SG" != "None" ] && terraform import \
            -var="public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            aws_security_group.sg "$SG" 2>/dev/null || true
        working-directory: terraform

      - name: Terraform Plan
        if: steps.check_ec2.outputs.exists != 'true'
        run: |
          terraform plan \
            -var="public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -out=tfplan
        working-directory: terraform

      - name: Terraform Apply
        if: steps.check_ec2.outputs.exists != 'true'
        run: terraform apply -auto-approve tfplan
        working-directory: terraform

      - name: Get IP
        id: get_ip
        run: |
          if [ "${{ steps.check_ec2.outputs.exists }}" == "true" ]; then
            echo "ip=${{ steps.check_ec2.outputs.ip }}" >> $GITHUB_OUTPUT
          else
            echo "ip=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT
          fi
        working-directory: terraform


  configure:
    name: Configure nginx
    runs-on: ubuntu-latest
    needs: provision

    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ansible

      - name: Write SSH private key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Wait for SSH
        run: |
          for i in $(seq 1 30); do
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
              -i /tmp/deploy_key ${{ secrets.SSH_USER || 'ubuntu' }}@${{ needs.provision.outputs.server_ip }} echo ok \
              && break || sleep 10
          done

      - name: Run Ansible
        run: |
          ansible-playbook \
            -i "${{ needs.provision.outputs.server_ip }}," \
            --private-key /tmp/deploy_key \
            -u ${{ secrets.SSH_USER }} \
            playbook.yml
        working-directory: ansible
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          ANSIBLE_HOST_KEY_CHECKING: "False"


  verify:
    name: Verify deployment
    runs-on: ubuntu-latest
    needs: [provision, configure]

    steps:
      - name: Health check
        run: |
          SERVER_IP="${{ needs.provision.outputs.server_ip }}"
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 http://$SERVER_IP/ || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed with HTTP $STATUS"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after all attempts"
          exit 1


  notify:
    name: Notify live URL
    runs-on: ubuntu-latest
    needs: [provision, configure, verify]

    steps:
      - name: Print live URL
        run: |
          echo "==========================================="
          echo "  nginx is live!"
          echo "  URL: http://${{ needs.provision.outputs.server_ip }}"
          echo "==========================================="
